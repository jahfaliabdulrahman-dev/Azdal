# =============================================================================
# Azdal — Build & Publish APK
# =============================================================================
# Builds a real, installable release APK on every push to `main` (and on
# manual dispatch), then uploads it to the rolling `latest` GitHub Release so
# there is always a current, working download for testers.
#
# Credentials are injected at build time via --dart-define-from-file=.env,
# reconstructed here from repository secrets (SUPABASE_URL, SUPABASE_ANON_KEY,
# GEMINI_API_KEY). These are compile-time constants baked into the APK — the
# same keys the manual builds already shipped (DEC-014, accepted client-side).
#
# The release build signs with the debug key (android/app/build.gradle.kts:
# release { signingConfig = signingConfigs.getByName("debug") }), so no
# keystore/secret signing setup is needed to produce an installable APK.
# =============================================================================

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - run: flutter pub get

      - name: Reconstruct .env from secrets
        run: |
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
          } > .env

      - name: Build release APK
        run: flutter build apk --release --dart-define-from-file=.env

      - name: Publish to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest \
            build/app/outputs/flutter-apk/app-release.apk \
            --clobber
