# =============================================================================
# Azdal CI — analyze + test
# =============================================================================
# Runs on every push and pull request to `main`.
#
# Fails only on REAL problems (analyzer errors + warnings) and failing tests.
# Style-level infos (avoid_print for gated debug logging, prefer_const, etc.)
# are reported but non-blocking via --no-fatal-infos, so day-to-day commits
# aren't marked red for cosmetic lints.
#
# Flutter version MUST match local dev (3.44.6): the code uses
# Color.withValues() (Flutter 3.27+). An older CI Flutter (this was pinned to
# 3.24) fails to compile it and turned every commit red — which is exactly why
# the repo *looked* broken even though the app builds and runs fine.
#
# flutter test does NOT need Supabase/Gemini credentials — the suite handles a
# missing session gracefully. The APK build (which does need them) lives in
# build.yml, not here.
# =============================================================================

name: Azdal CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
