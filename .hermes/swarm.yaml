# ═══════════════════════════════════════════════════════════════════════════════
# 🔀 TASK ROUTING DECISION TREE — READ THIS FIRST
# ═══════════════════════════════════════════════════════════════════════════════
#
# BEFORE SENDING ANY TASK, ASK YOURSELF:
#
#   Is this task SMALL (≤2 files, same folder, bug fix, simple config change)?
#       │
#       ├── YES ──▶ Send DIRECTLY to Sulaiman (default profile / this chat).
#       │           DO NOT use /goal. DO NOT involve the swarm.
#       │           Sulaiman will execute the fix himself.
#       │
#       │           Examples:
#       │           - Fix a typo in one file
#       │           - Update a config value
#       │           - Change a color/token in theme
#       │           - Add a simple method to existing class
#       │           - Run flutter analyze and fix warnings
#       │           - Search codebase for something
#       │
#       └── NO ──▶ This is an EPIC (3+ files, multi-domain, new feature,
#                   architecture change, new screen, data model change).
#                   │
#                   └── Use /goal with FULL FORMAT (below) → Lead Architect
#                       activates Kanban → decomposes → delegates to workers.
#                       The Lead Architect NEVER writes code — he ONLY
#                       orchestrates. If you see him writing code, STOP him.
#
# ═══════════════════════════════════════════════════════════════════════════════
# TWO ROUTES — DO NOT CONFUSE THEM:
# ═══════════════════════════════════════════════════════════════════════════════
#
#   ROUTE A: Direct to Sulaiman (default profile)
#   ─────────────────────────────────────────────
#   WHEN: Task is small, ≤2 files, same folder, bug fix, config, simple change
#   HOW: Just describe the task in this chat. No /goal. No Kanban.
#   WHO: Sulaiman executes directly. No workers involved.
#
#   ROUTE B: /goal → Lead Architect → Kanban Swarm
#   ─────────────────────────────────────────────
#   WHEN: EPIC — 3+ files, multi-domain, new feature, new screen, data change
#   HOW: Use /goal with the full template below
#   WHO: Lead Architect decomposes into Kanban tasks → workers execute
#   RULE: Lead Architect NEVER writes code. If he does, the task should've
#         been Route A (direct to Sulaiman).
#
# ═══════════════════════════════════════════════════════════════════════════════
# 🜔 THE LEADER — FLUTTER LEAD ARCHITECT (ORCHESTRATOR)
# ═══════════════════════════════════════════════════════════════════════════════
# Route B ONLY. For small tasks, use Route A (Sulaiman directly).
# The Lead Architect decomposes EPICs into Kanban tasks and routes them to
# workers. He NEVER writes application code. NEVER assigns BUILD/FIX/QA to self.
# ═══════════════════════════════════════════════════════════════════════════════

