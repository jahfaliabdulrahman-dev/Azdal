# ═══════════════════════════════════════════════════════════════════════════════
# KANBAN LANES — TASK FLOW
# ═══════════════════════════════════════════════════════════════════════════════

kanban:
  lanes:
    - BACKLOG                    # Unrefined ideas
    - READY_FOR_ARCHITECT        # Awaiting Lead decomposition
    - ARCHITECTURE_REVIEW        # Lead reviews architecture decisions
    - PRODUCT_REVIEW             # Product Steward validates scope
    - UX_DESIGN                  # Designer creates screen specs
    - BACKEND_DESIGN             # Backend Architect designs data model
    - DEPENDENCY_VERIFICATION    # Backend verifies all deps exist (LL-037)
    - FLUTTER_IMPLEMENTATION     # State Engineer writes code
    - QA_VALIDATION              # QA Tester runs Truth Check + test gates
    - HOSTILE_AUDIT              # Zero-Trust Auditor attacks (critical features)
    - DEVOPS_RELEASE_REVIEW      # DevOps builds APK + publishes
    - SCSI_GUARDIAN_SCAN         # صيّاد continuous scan + gatekeeping
    - DOCUMENTATION              # Steward updates lessons + traceability
    - NEEDS_FIX                  # Failed gate — rework required
    - APPROVED                   # All gates passed, awaiting EPIC closure
    - DONE                       # Complete
    - BLOCKED                    # External dependency or escalation

# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCY FLOW — TASK SEQUENCING
# ═══════════════════════════════════════════════════════════════════════════════

dependency_flow:
  parallel_lanes:
    - group: "Design & Data"
      workers: ["flutter-ui-ux-designer", "flutter-backend-db-architect"]
      note: "Designer and Backend can run in PARALLEL — no dependency"
    - group: "QA & Audit"
      workers: ["flutter-qa-tester", "flutter-zero-trust-auditor"]
      note: "QA and Auditor can run in PARALLEL — no dependency"
  sequential_chain:
    - step: 1
      name: "Product Review"
      worker: "flutter-product-steward"
      depends_on: []
    - step: 2
      name: "Design & Data"
      workers: ["flutter-ui-ux-designer", "flutter-backend-db-architect"]
      depends_on: [1]
    - step: 3
      name: "Dependency Verification"
      worker: "flutter-backend-db-architect"
      depends_on: [2]
    - step: 4
      name: "Implementation"
      worker: "flutter-state-engineer"
      depends_on: [3]
    - step: 5
      name: "QA + Audit"
      workers: ["flutter-qa-tester", "flutter-zero-trust-auditor"]
      depends_on: [4]
    - step: 6
      name: "DevOps Release"
      worker: "flutter-devops-release-engineer"
      depends_on: [5]
  guardian:
    worker: "flutter-curiosity-hunter"
    runs: "CONTINUOUSLY from step 1 through step 6"
    note: "Scans every 60 seconds. Approves/Rejects tasks. Final gate before DONE."
  documentation:
    worker: "flutter-documentation-steward"
    runs: "At stage close + on lesson discovery"
    note: "Updates 00_lessons_learned.md same-stage, not later."

# ═══════════════════════════════════════════════════════════════════════════════
# EPIC COMPLETION GATES — Article II (Constitution)
# ═══════════════════════════════════════════════════════════════════════════════

epic_completion_gates:
  - gate_1: "All sub-tasks status = DONE or ARCHIVED"
  - gate_2: "All code committed (git log shows recent commits)"
  - gate_3: "All code pushed (git status clean, git push no errors)"
  - gate_4: "All tests pass (flutter test, count ≥ baseline)"
  - gate_5: "Analyze clean (flutter analyze, 0 new issues)"
  - gate_6: "SCSI Guardian approved (no unresolved CRITICAL findings)"

# ═══════════════════════════════════════════════════════════════════════════════
